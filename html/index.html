<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Woopy Fly</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <header class="header">

    <a class="header__logo">
      <img src="../images/logo_woopyfly.png" alt="Woopy Fly" width="25" height="25">
      <span>Woopy Fly</span>
    </a>

    <input type="search" id="search-input" class="header__search" placeholder="Search…" autocomplete="off">

  </header>


  <div class="layout">

    <aside class="sidebar-left">

      <ul class="library" id="playlist-list">
      </ul>

      <button type="button" id="btn-new-playlist" class="btn-new-playlist">
        + New playlist
      </button>

    </aside>


    <main class="main-content">

      <h1>Tracks for you</h1>

      <div class="track-grid" id="track-grid">
      </div>

    </main>

    <aside class="sidebar-right">

      <img src="" alt="" id="now-cover" class="now-playing__cover">
      <h2 id="now-title">—</h2>
      <p  id="now-artist">—</p>

    </aside>

  </div>


  <div class="player-bar">

    <audio id="audio-player" preload="none"></audio>

    <div class="player-bar__track">
      <img src="" alt="" id="player-cover" class="player-bar__cover" width="48" height="48">
      <div>
        <span id="player-title">—</span>
        <span id="player-artist">—</span>
      </div>
      <button type="button" id="btn-like" aria-pressed="false">♥</button>
    </div>

    <div class="player-bar__controls">
      <button type="button" id="btn-shuffle" aria-pressed="false">⇄</button>
      <button type="button" id="btn-prev">⏮</button>
      <button type="button" id="btn-play"  aria-pressed="false">▶</button>
      <button type="button" id="btn-next">⏭</button>
      <button type="button" id="btn-repeat" aria-pressed="false">↺</button>
    </div>

    <div class="player-bar__progress">
      <span id="time-current">0:00</span>
      <input type="range" id="progress-bar" min="0" max="100" value="0">
      <span id="time-total">0:00</span>
    </div>

    <div class="player-bar__volume">
      <button type="button" id="btn-mute">🔊</button>
      <input type="range" id="volume-bar" min="0" max="100" value="80">
    </div>

  </div>


  <footer class="site-footer">
    <a href="mailto:woopyfly@gmail.com">woopyfly@gmail.com</a>
    <small>&copy; 2025 WoopyFly</small>

  </footer>



  <template id="track-card-template">
    <article class="track-card">
      <img src="" alt="" loading="lazy" width="80" height="80">
      <div class="track-card__info">
        <h3 class="track-card__title"></h3>
        <p  class="track-card__artist"></p>
        <span class="track-card__duration"></span>
      </div>
      <button type="button" class="track-card__play-btn">▶</button>
    </article>
  </template>

  <template id="playlist-item-template">
    <li class="library__item">
      <a href="" class="library__link">
        <span class="library__playlist-name"></span>
      </a>
    </li>
  </template>


  <dialog id="dialog-new-playlist">

    <h2>New Playlist</h2>

    <label for="playlist-name">Name</label>
    <input type="text" id="playlist-name" placeholder="My playlist" maxlength="50">

    <div class="dialog-actions">
      <button type="button" id="dialog-cancel">Cancel</button>
      <button type="button" id="dialog-create">Create</button>
    </div>

  </dialog>


  <script src="../JavaScript/main.js"   type="module"></script>
  

</body>
</html>
